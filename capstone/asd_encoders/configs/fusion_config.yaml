embeddings:
  eeg: "embeddings/eeg_embeddings.npz"
  gaze: "embeddings/gaze_embeddings.npz"
  gait: "embeddings/gait_embeddings.npz"

model:
  emb_dim: 512
  n_heads: 8
  n_layers: 2
  mlp_ratio: 2
  dropout: 0.3

train:
  batch_size: 32
  epochs: 150
  lr: 1.0e-4
  weight_decay: 1.0e-4
  label_smoothing: 0.1
  early_stop_patience: 20
  n_folds: 5
  seed: 42
  checkpoint_dir: "checkpoints/fusion"

pairing_strategy: "label_matched_random"
n_synthetic_samples_per_class: 2000
